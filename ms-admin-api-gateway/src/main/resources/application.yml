server:
  port: 8080
spring:
  application:
    name: ms-admin-api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/auth/**,/api/auth/**
        - id: ms-reserva
          uri: lb://ms-reserva
          predicates:
            - Path=/api/reservas/**
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
management:
  endpoints:
    web:
      exposure:
        include: "*"
